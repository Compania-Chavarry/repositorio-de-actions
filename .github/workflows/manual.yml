name: Workflow Manual

on:
  workflow_dispatch:

jobs:

  primer_job:
    name: Primer Job
    runs-on: ubuntu-latest

    steps:
      - name: Primer step
        run: echo "Hello, world! "

  segundo_job:
    name: Segundo Job
    runs-on: ubuntu-latest
    needs: [primer_job]

    steps:
      - name: Primer step
        run: echo "Hello, world! - Desde el segundo Job "

      - name: Segundo step
        run: echo "Hello, world! - Otro step más"

  job_paralelo:
    name: Job paralelo
    runs-on: ubuntu-latest

    steps:
      - name: Primer step
        run: echo "Hello, world! – Job paralelo"
        
  otro_job_paralelo:
    name: Otro Job
    runs-on: ubuntu-latest
    needs: [job_paralelo]

    steps:
      - name: Primer step
        run: echo "Hello, world! – Otro job paralelo"
        
  job_final:
    name: Job final
    runs-on: ubuntu-latest
    needs: [segundo_job, otro_job_paralelo]

    steps:
      - name: Primer step
        run: echo "Workflow finalizado correctamente"
