name: Workflow Manual con Parámetros

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod
      version:
        description: "Versión de la app"
        required: true
        default: "1.0.0"
      run_tests:
        description: "¿Ejecutar pruebas?"
        required: true
        default: true
        type: boolean
      replicas:
        description: "Número de réplicas"
        required: false
        default: "2"
        type: number

jobs:
  imprimir_valores:
    name: Imprimir valores
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar valores
        run: |
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Version: ${{ github.event.inputs.version }}"
          echo "Run tests: ${{ github.event.inputs.run_tests }}"
          echo "Replicas: ${{ github.event.inputs.replicas }}"

  info_sistema:
    name: Información del Sistema Operativo
    runs-on: ubuntu-latest
    needs: imprimir_valores
    steps:
      - name: Mostrar info de sistema
        run: |
          echo "Sistema operativo: $RUNNER_OS"
          uname -a
          lsb_release -a || cat /etc/os-release

  pruebas_condicionales:
    name: Pruebas Condicionales
    runs-on: ubuntu-latest
    needs: info_sistema
    steps:
      - name: Ejecutar pruebas si run_tests = true
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: |
          echo "Ejecutando pruebas automáticas..."
          echo "Aquí iría el comando de tests"
      - name: Step solo en Linux
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo "Este step solo corre en Linux"
