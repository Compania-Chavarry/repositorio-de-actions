name: build-deploy-flow

on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente de despliegue'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prd
      nombre:
        description: 'Nombre de la aplicación'
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Construyendo app
        run: echo "Construyendo app ${{ github.event.inputs.nombre }}"

      - name: Step 2 - App construida
        run: echo "App ${{ github.event.inputs.nombre }} construida"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Step 1 - Desplegando en ambiente
        run: echo "Desplegando en ambiente ${{ github.event.inputs.ambiente }}"

      - name: Step 2 - Aplicación desplegada
        run: echo "Aplicación ${{ github.event.inputs.nombre }} desplegada en ${{ github.event.inputs.ambiente }}"
